aws:
  regions:
    - us-east-1
    - us-east-2
    - us-west-1
    - us-west-2
    - eu-west-1
    - eu-central-1
  enabled_services:
    - s3
    - iam
    - ec2
checks:
  iam:
    max_access_key_age_days: 90
    max_access_key_unused_days: 90
    check_root_mfa: true
    detect_admin_policies: true
    detect_risky_policies: true
    detect_allow_not_action: true
    detect_allow_not_resource: true
    privilege_escalation_actions:
      - iam:CreatePolicyVersion
      - iam:SetDefaultPolicyVersion
      - iam:AttachUserPolicy
      - iam:AttachRolePolicy
      - iam:AttachGroupPolicy
      - iam:PutUserPolicy
      - iam:PutRolePolicy
      - iam:PutGroupPolicy
      - iam:CreateAccessKey
      - iam:CreateLoginProfile
      - iam:UpdateLoginProfile
      - iam:AddUserToGroup
      - iam:UpdateAssumeRolePolicy
      - iam:PassRole
    identity_profile:
      enabled: true
      scoring:
        weights:
          no_mfa: 20
          old_keys: 15
          admin_policies: 30
          risky_policies: 25
      include_users: true
      include_roles: true
      top_n: 20
  ec2:
    sensitive_ports:
      - 22
      - 3389
      - 5432
      - 3306
      - 6379
      - 27017
      - 5984
      - 5985
      - 443
    allowed_cidrs: []
    check_unused_security_groups: true
  s3:
    require_default_encryption: true
    allowed_sse_algorithms:
      - AES256
      - aws:kms
    check_versioning: true
    check_server_access_logging: true
intel:
  timeout_seconds: 30
  retry:
    max_attempts: 3
    backoff_seconds: 2
  cloud_attribution:
    enabled: true
    providers:
      aws:
        asn_numbers: 16509,14618
        org_contains: Amazon,AWS
        hostname_contains: amazonaws.com,aws
      azure:
        asn_numbers: '8075'
        org_contains: Microsoft
        hostname_contains: azure,microsoft
      gcp:
        asn_numbers: '15169'
        org_contains: Google
        hostname_contains: google
    confidence_weights:
      asn_match: 40
      org_match: 30
      hostname_match: 20
      privacy_hosting: 10
risk_scoring:
  cap: 100
  weights:
    critical: 50
    high: 15
    medium: 5
    low: 1
    info: 0
ai:
  enabled: true
  provider: openai
  model: gpt-4o
  base_url: https://api.openai.com/v1
  timeout_seconds: 120
  temperature: 0.3
  max_tokens: 4096
  max_input_events: 50000
  summarize:
    cloudtrail:
      top_n_actors: 10
      top_n_events: 20
      max_resources: 50
  redaction:
    enabled: true
    fields:
      - accessKeyId
      - userName
      - sessionContext.sessionIssuer.userName
  indicators:
    skip_ips:
      - unknown
      - '-'
      - 0.0.0.0
      - 127.0.0.1
      - '::1'
      - localhost
    skip_domain_suffixes:
      - .amazonaws.com
      - .aws.amazon.com
      - .cloudfront.net
      - .googleapis.com
      - .google.com
      - .microsoft.com
      - .azure.com
      - .windows.net
    display_limits:
      ips: 100
      identities: 50
      domains: 30
      user_agents: 50
      copy_ips: 100
